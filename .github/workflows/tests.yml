name: oct2py

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Run weekly
    # * is a special character in YAML so you have to quote this string
    - cron: "0 0 * * 0"

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    needs: docs
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Octave
        uses: calysto/octave_kernel@72a4e04a25ecd24b4d143782fb2313ef384f3e6b # v0.39.0
        with:
          install-type: "ubuntu"
      - name: Install signal package
        run:
          sudo apt-get install -qq octave-signal
      - name: Run tests
        run: just test
      - name: Run example notebook
        run: just test-notebook
      - name: Test opencv compatibility
        if: ${{ matrix.python-version == '3.10' }}
        run: just test-opencv

  cover:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
        with:
          python-version: "3.10"
      - name: Install Octave
        uses: calysto/octave_kernel@72a4e04a25ecd24b4d143782fb2313ef384f3e6b # v0.39.0
        with:
          install-type: ${{ startsWith(matrix.os, 'ubuntu') && 'ubuntu' || startsWith(matrix.os, 'windows') && 'windows' || 'macos' }}
      - name: Install signal package
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: sudo apt-get install -qq octave-signal
      - name: Generate coverage report
        run: ${{ startsWith(matrix.os, 'ubuntu') && 'just cover' || 'just cover tests/test_usage.py tests/test_misc.py tests/test_octavemagic.py' }}
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          plugins: ""   # <-- disables the Python (and other) plugins

  test-other:
    needs: pre_commit
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            install-type: ubuntu-flatpak
          - os: ubuntu-latest
            install-type: ubuntu-snap
      fail-fast: false
    env:
      # Place the virtualenv in the project dir so snap-confined Octave can access it
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - name: Install Octave
        uses: calysto/octave_kernel@72a4e04a25ecd24b4d143782fb2313ef384f3e6b # v0.39.0
        with:
          install-type: ${{ matrix.install-type }}
      - name: Run tests
        run: just test tests/test_usage.py tests/test_misc.py

  benchmark:
    runs-on: ubuntu-24.04
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: calysto/maintainer_tools/actions/base-setup@v1
        with:
          python-version: "3.10"
      - name: Install Octave
        uses: calysto/octave_kernel@72a4e04a25ecd24b4d143782fb2313ef384f3e6b # v0.39.0
        with:
          install-type: "ubuntu"
      - name: Install signal package
        run: sudo apt-get install -qq octave-signal
      - name: Run benchmark comparison
        run: just benchmark-compare

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - run: just docs

  pre_commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - run: just pre-commit --hook-stage=manual
      - name: Show diff on failure
        if: failure()
        run: git diff

  typing:
    name: Typing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - run: just typing

  tests_check: # This job does nothing and is only used for the branch protection
    if: always()
    needs:
      - test
      - cover
      - test-other
      - pre_commit
      - typing
      - docs
      - benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-failures: benchmark
          jobs: ${{ toJSON(needs) }}
