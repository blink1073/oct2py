name: oct2py

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Run nightly
    # * is a special character in YAML so you have to quote this string
    - cron: "0 0 * * *"

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    needs: docs
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14", "3.14t"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Octave
        uses: calysto/octave_kernel@64a3888bac86006cba0aafb6fa9c8bf04abaaf8e # v1.0.0
        with:
          install-type: "ubuntu"
      - name: Install signal package
        run:
          sudo apt-get install -qq octave-signal
      - name: Run tests
        run: just test
      - name: Run example notebook
        run: just test-notebook
      - name: Test opencv compatibility
        if: ${{ matrix.python-version == '3.11' }}
        run: just test-opencv

  cover:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
        with:
          python-version: "3.11"
      - name: Install Octave
        uses: calysto/octave_kernel@64a3888bac86006cba0aafb6fa9c8bf04abaaf8e # v1.0.0
        with:
          install-type: ${{ startsWith(matrix.os, 'ubuntu') && 'ubuntu' || startsWith(matrix.os, 'windows') && 'windows' || 'macos' }}
      - name: Install signal package
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: sudo apt-get install -qq octave-signal
      - name: Generate coverage report
        run: ${{ startsWith(matrix.os, 'ubuntu') && 'just cover' || 'just cover tests/test_usage.py tests/test_misc.py tests/test_octavemagic.py' }}
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          plugins: ""   # <-- disables the Python (and other) plugins

  test-other:
    needs: pre_commit
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            install-type: ubuntu-flatpak
          - os: ubuntu-latest
            install-type: ubuntu-snap
      fail-fast: false
    env:
      # Place the virtualenv in the project dir so snap-confined Octave can access it
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - name: Install Octave
        uses: calysto/octave_kernel@64a3888bac86006cba0aafb6fa9c8bf04abaaf8e # v1.0.0
        with:
          install-type: ${{ matrix.install-type }}
      - name: Run tests
        run: just test tests/test_usage.py tests/test_misc.py

  benchmark:
    runs-on: ubuntu-24.04
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: calysto/maintainer_tools/actions/base-setup@v1
        with:
          python-version: "3.11"
      - name: Install Octave
        uses: calysto/octave_kernel@64a3888bac86006cba0aafb6fa9c8bf04abaaf8e # v1.0.0
        with:
          install-type: "ubuntu"
      - name: Install signal package
        run: sudo apt-get install -qq octave-signal
      - name: Run benchmark comparison
        run: just benchmark-compare

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - run: just docs

  pre_commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - run: just pre-commit --hook-stage=manual
      - name: Show diff on failure
        if: failure()
        run: git diff

  typing:
    name: Typing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - run: just typing

  make_sdist:
    name: Build and Inspect Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0

  test_sdist:
    name: Test SDist
    needs: make_sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - name: Install Octave
        uses: calysto/octave_kernel@64a3888bac86006cba0aafb6fa9c8bf04abaaf8e # v1.0.0
        with:
          install-type: "ubuntu"
      - name: Install signal package
        run: sudo apt-get install -qq octave-signal
      - uses: calysto/maintainer_tools/actions/test-sdist@v1
        with:
          test: pytest -v tests/test_usage.py tests/test_misc.py

  test_release:
    name: Test Release (Dry Run)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - uses: calysto/maintainer_tools/actions/release@v1
        with:
          version: patch
          dry_run: "true"
          ref: ${{ github.head_ref }}

  tests_check: # This job does nothing and is only used for the branch protection
    if: always()
    needs:
      - test
      - cover
      - test-other
      - pre_commit
      - typing
      - docs
      - benchmark
      - make_sdist
      - test_sdist
      - test_release
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-failures: benchmark
          allowed-skips: test_release
          jobs: ${{ toJSON(needs) }}
