name: oct2py

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Run weekly
    # * is a special character in YAML so you have to quote this string
    - cron: "0 0 * * 0"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu-latest, macos-latest, windows-latest]
        os: [windows-latest]
        python-version: ["3.10"]  #,  "3.14"]
        # include:
        #   - os: ubuntu-latest
        #     python-version: "3.11"
        #   - os: ubuntu-latest
        #     python-version: "3.12"
        #   - os: ubuntu-latest
        #     python-version: "3.13"
        #   - os: ubuntu-latest
        #     python-version: "3.14t"

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: taiki-e/install-action@just
      - name: Install Octave (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt-get install -qq octave octave-signal octave-dev
      - name: Install Octave (macOS)
        if: runner.os == 'macOS'
        run: brew install -q octave
      - name: Install Octave (Windows)
        if: runner.os == 'Windows'
        run: |
          winget install GNU.Octave --silent --disable-interactivity --accept-source-agreements --accept-package-agreements
          dir "C:\Program Files"
          octave.exe --version
      - name: Generate coverage report
        run: just cover
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

